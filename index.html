<!DOCTYPE html>
<html lang="es" class="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblia | Minimalist Reader</title>
    <meta name="description" content="Una experiencia de lectura bíblica limpia y minimalista inspirada en la IA.">
    <!-- Google Fonts: Inter and EB Garamond for a premium look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gemini: {
                            bg: '#f8fafc',
                            darkBg: '#0f172a',
                            card: 'rgba(255, 255, 255, 0.7)',
                            darkCard: 'rgba(30, 41, 59, 0.7)',
                            accent: '#3b82f6',
                            text: '#1e293b',
                            darkText: '#f1f5f9'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['EB Garamond', 'serif'],
                    }
                }
            }
        }
    </script>
</head>

<body
    class="bg-gemini-bg dark:bg-gemini-darkBg text-gemini-text dark:text-gemini-darkText transition-colors duration-300 font-sans min-h-screen flex flex-col">

    <!-- Header / Nav -->
    <header
        class="fixed top-0 left-0 right-0 h-16 flex items-center justify-between px-6 z-50 transition-all duration-300 backdrop-blur-md border-b border-gray-200 dark:border-gray-800">
        <div class="flex items-center gap-4">
            <button id="menu-toggle"
                class="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <h1 class="text-xl font-medium tracking-tight">La Biblia Hablada</h1>
        </div>

        <div class="flex-1 max-w-2xl px-4 hidden md:block">
            <div class="relative group">
                <div
                    class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400 group-focus-within:text-gemini-accent transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </div>
                <input type="text" id="global-search" placeholder="Busca un versículo, libro o palabra..."
                    class="w-full bg-gray-100 dark:bg-gray-800 border-none rounded-2xl py-2 pl-10 pr-4 focus:ring-2 focus:ring-gemini-accent focus:bg-white dark:focus:bg-gray-950 transition-all outline-none text-sm">
            </div>
        </div>

        <div class="flex items-center gap-2">
            <div class="relative hidden sm:block">
                <select id="language-select"
                    class="appearance-none bg-gray-100 dark:bg-gray-800 border-none rounded-full py-2 pl-4 pr-8 text-sm focus:ring-2 focus:ring-gemini-accent outline-none cursor-pointer transition-colors text-gray-700 dark:text-gray-300 font-medium">
                    <option value="es">Español (RVR)</option>
                    <option value="en">English (KJV)</option>
                    <option value="pt">Português (NVI)</option>
                    <option value="fr">Français (APEE)</option>
                    <option value="de">Deutsch (Schlachter)</option>
                    <option value="ru">Русский (Synodal)</option>
                    <option value="ko">한국어 (Korean)</option>
                    <option value="zh">中文 (CUV)</option>
                    <option value="el">Ελληνικά (Greek)</option>
                    <option value="fi">Suomi (Finnish)</option>
                    <option value="ro">Română (Cornilescu)</option>
                    <option value="ar">العربية (SVD)</option>
                    <option value="vi">Tiếng Việt (Vietnamese)</option>
                </select>
                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-500">
                    <svg class="h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd"
                            d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"
                            clip-rule="evenodd" />
                    </svg>
                </div>
            </div>
            <button id="theme-toggle"
                class="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition-colors hidden sm:block">
                <svg id="theme-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round"></svg>
            </button>
            <div class="sm:hidden flex items-center gap-1">
                <select id="language-select-mobile"
                    class="appearance-none bg-transparent border-none text-sm outline-none font-medium mr-1 p-1">
                    <option value="es">ES</option>
                    <option value="en">EN</option>
                    <option value="pt">PT</option>
                    <option value="fr">FR</option>
                    <option value="de">DE</option>
                    <option value="ru">RU</option>
                    <option value="ko">KO</option>
                    <option value="zh">ZH</option>
                    <option value="el">EL</option>
                    <option value="fi">FI</option>
                    <option value="ro">RO</option>
                    <option value="ar">AR</option>
                    <option value="vi">VI</option>
                </select>
                <button id="theme-toggle-mobile"
                    class="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition-colors">
                    <svg id="theme-icon-mobile" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round"></svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Sidebar Overlay -->
    <div id="sidebar-overlay"
        class="fixed inset-0 bg-black/20 dark:bg-black/40 z-40 hidden backdrop-blur-[2px] transition-all duration-300">
    </div>

    <!-- Sidebar -->
    <aside id="sidebar"
        class="fixed top-0 left-0 bottom-0 w-72 bg-white dark:bg-gray-950 z-50 transform -translate-x-full transition-transform duration-300 ease-out border-r border-gray-200 dark:border-gray-800 flex flex-col">
        <div class="p-6 flex items-center justify-between border-b border-gray-100 dark:border-gray-900">
            <span class="font-semibold text-lg">Libros</span>
            <div class="flex items-center gap-2">
                <button id="pin-sidebar"
                    class="hidden md:block p-1 text-gray-400 hover:text-gemini-accent transition-colors"
                    title="Mantener abierto">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="sidebar-pin-icon">
                        <path d="M12 17v5" />
                        <path
                            d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V7a1 1 0 0 1 1-1 2 2 0 0 0 0-4H8a2 2 0 0 0 0 4 1 1 0 0 1 1 1z" />
                    </svg>
                </button>
                <button id="close-sidebar" class="md:hidden">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
        </div>
        <div class="flex-1 overflow-y-auto p-4 space-y-1" id="books-list">
            <!-- Books populated by JS -->
            <div class="animate-pulse space-y-3 p-2">
                <div class="h-4 bg-gray-200 dark:bg-gray-800 rounded w-3/4"></div>
                <div class="h-4 bg-gray-200 dark:bg-gray-800 rounded w-1/2"></div>
                <div class="h-4 bg-gray-200 dark:bg-gray-800 rounded w-5/6"></div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main id="main-content" class="flex-1 mt-16 flex flex-col items-center transition-all duration-300">
        <div id="content-area"
            class="w-full max-w-3xl px-6 py-12 md:py-20 min-h-screen transition-opacity duration-300">
            <!-- Reader content goes here -->
            <div id="reader-container" class="opacity-0 translate-y-4 transition-all duration-500">
                <div id="bread-crumb"
                    class="text-xs font-medium text-gray-500 dark:text-gray-400 mb-4 uppercase tracking-widest">Génesis
                    • Capítulo 1</div>
                <h2 id="chapter-title" class="text-4xl md:text-5xl font-serif font-bold mb-10 leading-tight">En el
                    principio...</h2>
                <div id="verses-container"
                    class="space-y-6 text-xl md:text-2xl font-serif leading-relaxed text-gray-800 dark:text-gray-200">
                    <!-- Verses populated by JS -->
                </div>
            </div>

            <!-- Empty State / Loading -->
            <div id="initial-state" class="flex flex-col items-center justify-center text-center mt-20">
                <div
                    class="w-20 h-20 mb-8 bg-gemini-accent/10 rounded-3xl flex items-center justify-center text-gemini-accent">
                    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                    </svg>
                </div>
                <h3 class="text-2xl font-medium mb-2">Bienvenido a la Biblia</h3>
                <p class="text-gray-500 dark:text-gray-400 max-w-sm">Explora los libros o busca un pasaje específico
                    para comenzar tu lectura.</p>
            </div>
        </div>
    </main>

    <!-- Floating Navigation (Mobile) -->
    <div class="fixed bottom-8 left-1/2 -translate-x-1/2 md:hidden z-50">
        <button id="search-mobile-trigger"
            class="bg-gemini-accent text-white shadow-xl shadow-gemini-accent/20 px-6 py-3 rounded-full flex items-center gap-2 font-medium">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            Buscar
        </button>
    </div>

    <!-- Search Modal (Mobile/Search Results) -->
    <div id="search-modal" class="fixed inset-0 z-[60] hidden flex flex-col bg-white dark:bg-gray-950">
        <div class="h-16 flex items-center px-4 border-b dark:border-gray-800">
            <button id="close-search" class="p-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m15 18-6-6 6-6" />
                </svg>
            </button>
            <input type="text" id="modal-search-input" placeholder="Busca palabras o versículos..."
                class="flex-1 bg-transparent border-none outline-none px-4 text-lg">
        </div>
        <div id="search-results" class="flex-1 overflow-y-auto p-4 space-y-4">
            <!-- Search results populated by JS -->
        </div>
    </div>

    <script src="app.js?v=2"></script>
</body>

</html>
